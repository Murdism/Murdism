name: Update citation stats

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-citations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Refresh citation data
        run: python3 scripts/update_citations.py

      - name: Commit and push citation update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/citations.json site/data/citations.json
          if git diff --cached --quiet; then
            echo "No citation changes to commit"
          else
            git commit -m "Update citation stats"
            git push
          fi
