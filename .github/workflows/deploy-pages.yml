name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # Allow temporarily running actions that target Node 20 on Node 24 runners
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
          # Optional: provide a Personal Access Token (repo/pages scope) via
          # the secret `GH_PAGES_PAT` if the GITHUB_TOKEN lacks permission.
          token: ${{ secrets.GH_PAGES_PAT }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
